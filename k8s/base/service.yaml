apiVersion: v1
kind: Service
metadata:
  name: proxyforge-backend-svc
spec:
  selector:
    app: proxyforge-backend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: proxyforge-frontend-svc
spec:
  selector:
    app: proxyforge-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: LoadBalancer
